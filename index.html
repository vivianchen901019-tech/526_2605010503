<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 人生經營成果報告 - 旅程</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FEF9E7; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { color: #856404; border-bottom: 2px solid #856404; font-weight: 500; }
        .glass-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        
        /* 照片立可拍樣式 */
        .photo-card {
            background-color: white;
            padding: 10px 10px 30px 10px; /* 下方留白較多，像拍立得 */
            box-shadow: 0 4px 15px rgba(133, 100, 4, 0.1);
            transform: rotate(-1.5deg); /* 微微傾斜 */
            transition: all 0.3s ease;
        }
        .photo-card:hover {
            transform: rotate(0deg) scale(1.02);
        }
    </style>
</head>
<body class="text-gray-700">

<div id="app" class="max-w-md mx-auto min-h-screen pb-24 relative">
    
    <header class="p-6 pt-10 flex justify-between items-end">
        <div>
            <h1 class="text-2xl font-light tracking-widest text-yellow-800">2026</h1>
            <p class="text-sm opacity-60">人生經營成果報告 · 台北</p>
        </div>
    </header>

    <div class="px-6 mb-8 mt-2">
        <div class="photo-card rounded-sm overflow-hidden">
            <img src="image1.jpg" 
                 alt="我們的合照" 
                 class="w-full h-52 object-cover border border-gray-100"
                 onerror="this.src='https://via.placeholder.com/600x400/FFFDE7/856404?text=Please+Add+image1.jpg'">
        </div>
    </div>

    <nav class="flex overflow-x-auto no-scrollbar px-6 space-x-8 border-b border-yellow-200 mb-6">
        <button v-for="(day, index) in days" :key="index" 
                @click="currentDay = index"
                class="pb-2 text-sm whitespace-nowrap transition-all"
                :class="currentDay === index ? 'tab-active' : 'text-gray-400'">
            {{ day.date }} <br> <span class="text-xs">{{ day.label }}</span>
        </button>
    </nav>

    <div class="px-6 mb-4">
        <div class="glass-card rounded-2xl p-4 flex justify-between items-center text-sm">
            <div>
                <span class="block opacity-60">Taipei Weather</span>
                <span class="text-lg font-medium text-yellow-900">{{ weather.temp }}°C / {{ weather.desc }}</span>
            </div>
            <div class="text-3xl">☁️</div>
        </div>
    </div>

    <main class="px-6 space-y-4">
        <div v-for="(item, idx) in days[currentDay].events" :key="idx" 
             class="relative pl-6 border-l border-yellow-300 py-2 group">
            <div class="absolute -left-1.5 top-4 w-3 h-3 bg-yellow-500 rounded-full"></div>
            
            <div class="glass-card rounded-xl p-4 hover:shadow-sm transition-shadow">
                <div class="flex justify-between items-start mb-2">
                    <input v-model="item.time" class="bg-transparent font-medium text-sm w-16 focus:outline-none">
                    <button @click="removeEvent(idx)" class="text-xs text-gray-300 hover:text-red-400">刪除</button>
                </div>
                <input v-model="item.title" class="bg-transparent text-lg w-full focus:outline-none mb-1">
                <textarea v-model="item.note" placeholder="備註內容..." 
                          class="bg-transparent text-xs w-full opacity-60 resize-none focus:outline-none h-8"></textarea>
                
                <a :href="'https://www.google.com/maps/search/' + item.title" 
                   target="_blank" class="mt-2 inline-block text-[10px] bg-yellow-800 text-white px-2 py-1 rounded-full uppercase tracking-tighter">
                   Google Maps 導航
                </a>
            </div>
        </div>
        
        <button @click="addEvent" class="w-full py-3 border-2 border-dashed border-yellow-200 rounded-xl text-sm text-yellow-600 opacity-60 hover:opacity-100">
            + 新增行程項目
        </button>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/80 backdrop-blur-md border-t border-yellow-100 flex justify-around py-4 z-50">
        <button class="text-yellow-800 text-xs flex flex-col items-center">
            <span>📅</span>
            <span class="mt-1">行程</span>
        </button>
        <a href="https://liff.line.me/1655320992-Y8GowEpw/g/gfFP9p3Juu7ZywcBAPe4qM" target="_blank" class="text-gray-400 text-xs flex flex-col items-center">
            <span>💰</span>
            <span class="mt-1">分帳記帳</span>
        </a>
        <button @click="openMap" class="text-gray-400 text-xs flex flex-col items-center">
            <span>📍</span>
            <span class="mt-1">地圖</span>
        </button>
    </footer>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
        setup() {
            const currentDay = ref(0);
            const weather = ref({ temp: '--', desc: '載入中' });
            
            const days = ref([
                {
                    date: '05 / 01', label: 'Friday',
                    events: [
                        { time: '12:00', title: '雀客藏居 - 台北南港', note: '南港站、寄放行李' },
                        { time: '13:00', title: '梨谷韓式鐵板烤肉 忠孝總店', note: '昆陽站、吃午餐' },
                        { time: '15:00', title: 'Happ. 小樹屋｜杉松分館', note: '松山站、簡報' },
                        { time: '18:30', title: '林燒肉（大安店）', note: '吃晚餐' }
                    ]
                },
                {
                    date: '05 / 02', label: 'Saturday',
                    events: [
                        { time: '11:00', title: '一粒萬福', note: '北車' },
                        { time: '14:00', title: '中山商圈', note: '坪林手、拍拍貼' },
                        { time: '20:30', title: '松足體養生會館', note: '腳底按摩' }
                    ]
                },
                {
                    date: '05 / 03', label: 'Sunday',
                    events: [
                        { time: '11:30', title: '貳樓南港店', note: '逛Lalaport' }
                    ]
                }
            ]);

            const fetchWeather = async () => {
                try {
                    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=25.03&longitude=121.56&current_weather=true');
                    const data = await res.json();
                    weather.value = { temp: data.current_weather.temperature, desc: 'Taipei' };
                } catch (e) { weather.value = { temp: '26', desc: 'Sunny' }; }
            };

            const addEvent = () => {
                days.value[currentDay.value].events.push({ time: '00:00', title: '新地點', note: '' });
            };

            const removeEvent = (idx) => {
                days.value[currentDay.value].events.splice(idx, 1);
            };

            const openMap = () => {
                const locations = days.value[currentDay.value].events.map(e => e.title).join('/');
                window.open(`https://www.google.com/maps/dir/Current+Location/${locations}`, '_blank');
            };

            onMounted(fetchWeather);

            return { currentDay, days, weather, addEvent, removeEvent, openMap };
        }
    }).mount('#app');
</script>

</body>
</html>
